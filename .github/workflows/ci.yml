name: Pipeline CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Análise Estática (Lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Flake8
        run: python -m pip install --upgrade pip flake8

      - name: Executar Linter
        run: flake8 calculadora.py test_calculadora.py
  
  test:
    name: Testes Automatizados
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python e Cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' 
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Testes com Pytest
        run: pytest --junitxml=resultados_testes.xml

      - name: Salvar Artefato de Resultados
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: resultados_testes.xml
          retention-days: 5